<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mes Outils EPS</title>
    <style>
        :root {
            --primary-color: #2b6cb0;
            --bg-color: #f7fafc;
            --card-bg: #ffffff;
            --text-color: #2d3748;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            max-width: 800px;
            margin: 0 auto;
            padding: 40px 20px;
            line-height: 1.6;
        }
        h1 {
            color: var(--primary-color);
            border-bottom: 3px solid var(--primary-color);
            padding-bottom: 10px;
            margin-bottom: 30px;
        }
        p {
            font-size: 1.1rem;
            color: #4a5568;
        }
        .tools-list {
            list-style-type: none;
            padding: 0;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 20px;
            margin-top: 30px;
        }
        .tool-card {
            background: var(--card-bg);
            border-radius: 8px;
            padding: 20px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.05);
            border: 1px solid #e2e8f0;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .tool-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 15px rgba(0, 0, 0, 0.1);
        }
        .tool-link {
            text-decoration: none;
            color: var(--primary-color);
            font-weight: bold;
            font-size: 1.2rem;
            display: block;
            margin-bottom: 8px;
        }
        .tool-link:hover {
            color: #1a4373;
        }
        .tool-desc {
            font-size: 0.9rem;
            color: #718096;
            margin: 0;
        }
    </style>
</head>
<body>

    <h1>Catalogue d'Outils EPS</h1>
    <p>Sélectionnez l'application que vous souhaitez lancer :</p>

    <ul class="tools-list">
        <li class="tool-card">
            <a class="tool-link" href="./Zone Badminton/">🏸 Zone Badminton</a>
            <p class="tool-desc">Application d'observation et d'analyse des zones de jeu en Badminton.</p>
        </li>
    </ul>

</body>
</html>
