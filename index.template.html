<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mes outils EPS</title>
<style>
  :root {
    --bg: #0f172a;
    --card-bg: #1e293b;
    --card-hover: #273449;
    --text: #f1f5f9;
    --muted: #94a3b8;
    --accent: #38bdf8;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
    padding: 40px 20px;
  }
  header {
    max-width: 960px;
    margin: 0 auto 36px;
    text-align: center;
  }
  header h1 {
    font-size: 2rem;
    margin-bottom: 6px;
  }
  header p {
    color: var(--muted);
    margin: 4px 0;
  }
  .grid {
    max-width: 960px;
    margin: 0 auto;
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
    gap: 18px;
  }
  .card {
    background: var(--card-bg);
    border-radius: 14px;
    padding: 22px;
    text-decoration: none;
    color: var(--text);
    transition: transform 0.15s ease, background 0.15s ease;
    border: 1px solid #334155;
  }
  .card:hover {
    background: var(--card-hover);
    transform: translateY(-3px);
  }
  .card-icon { font-size: 2rem; margin-bottom: 10px; }
  .card h3 { margin: 0 0 8px; font-size: 1.1rem; }
  .card p { margin: 0; color: var(--muted); font-size: 0.9rem; line-height: 1.4; }
  .tags { margin-top: 12px; display: flex; flex-wrap: wrap; gap: 6px; }
  .tag {
    font-size: 0.72rem;
    background: #0f172a;
    color: var(--accent);
    padding: 2px 8px;
    border-radius: 999px;
    border: 1px solid #334155;
  }
  footer {
    max-width: 960px;
    margin: 40px auto 0;
    text-align: center;
    color: var(--muted);
    font-size: 0.8rem;
  }
</style>
</head>
<body>
  <header>
    <h1>🧰 Mes outils EPS</h1>
    <p><!-- TOOLS_COUNT --> outil(s) disponible(s)</p>
    <p>Dernière mise à jour automatique : <!-- LAST_UPDATE --></p>
  </header>

  <div class="grid">
<!-- TOOLS_GRID -->
  </div>

  <footer>
    Index généré automatiquement par GitHub Actions à chaque mise à jour du dépôt.
  </footer>
</body>
</html>
