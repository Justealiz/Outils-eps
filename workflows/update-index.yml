name: Mise à jour de l'index

on:
  push:
    branches: [main]
    paths-ignore:
      # On ignore index.html lui-même pour éviter une boucle infinie
      # (le job écrit ce fichier puis le commit déclenche un nouveau push)
      - "index.html"

permissions:
  contents: write

jobs:
  build-index:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Générer index.html
        run: node scripts/generate-index.mjs

      - name: Commit si changement
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html
          if git diff --cached --quiet; then
            echo "Aucun changement à committer."
          else
            git commit -m "chore: mise à jour automatique de l'index"
            git push
          fi
